<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homework template</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="fonts/stylesheet.css">
</head>

<body>
  <header></header>
  <main>
    <section>
      <div class="container">
        <div class="wrap">
          <div class="nav">
            <div>
              <ul class="nav_links">
                <li><a href="" class="nav_link active">All Plants</a></li>
                <li><a href="" class="nav_link">New Arrivals</a></li>
                <li><a href="" class="nav_link">Sale</a></li>
              </ul>
            </div>
            <div class="filter">
              <label for="sorting">Sort by:</label>
              <select name="Default sorting" id="sorting" class="select">
                <option value="">Default sorting</option>
                <option value="">Popular</option>
                <option value="">Most viewed</option>
                <option value="">Best rated</option>
              </select>
            </div>
          </div>
          <div class="cards">

            <div class="card">
              <div class="card_img">
                <img src="images/barbertondaisy.png" alt="" class="class_img">
                <div class="icons">
                  <img src="images/shopping.svg" alt="" class="icon">
                  <img src="images/heart.svg" alt="" class="icon">
                  <img src="images/find.svg" alt="" class="icon">
                </div>
              </div>

              <h3 class="card_title">Barberton Daisy</h3>
              <span class="card_price">$119.00</span>
            </div>

            <div class="card">
              <div class="card_img">
                <img src="images/angelwingbegonia.png" alt="" class="class_img">
                <div class="icons">
                  <img src="images/shopping.svg" alt="" class="icon">
                  <img src="images/heart.svg" alt="" class="icon">
                  <img src="images/find.svg" alt="" class="icon">
                </div>
              </div>

              <h3 class="card_title">Angel Wing Begonia</h3>
              <span class="card_price">$169.00</span>
            </div>

            <div class="card">
              <div class="card_img">
                <div class="off">
                  <span>13% OFF</span>
                </div>
                <img src="images/africanviolet.png" alt="" class="class_img">
                <div class="icons">
                  <img src="images/shopping.svg" alt="" class="icon">
                  <img src="images/heart.svg" alt="" class="icon">
                  <img src="images/find.svg" alt="" class="icon">
                </div>
              </div>

              <h3 class="card_title">African Violet</h3>
              <div class="card_prices">
                <span class="card_price">$199.00</span>
                <span class="old_card_price">$229.00</span>
              </div>

            </div>
          </div>
        </div>
    </section>
  </main>
  <footer></footer>
</body>

</html>
