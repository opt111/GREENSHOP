<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Домашнее задание №5</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <main>
        <section class="container">
            <h1 class="main-title">Форма з використанням псевдоелементів</h1>
            <form class="costom-form">
                <h2 class="secondary-title">Якась форма, <br>яка щось робить:</h2>
                <fieldset class="fieldset">
                    <legend>Виберіть один із варіантів</legend>
                    <p>
                        <label class="label radio-group">
                            <input type="radio" name="variant" value="1">
                            <span class="pseudo"></span>
                            Перший
                        </label>
                    </p>
                    <p>
                        <label class="label radio-group">
                            <input type="radio" name="variant" value="2">
                            <span class="pseudo"></span>
                            Другий
                        </label>
                    </p>
                    <p>
                        <label class="label radio-group">
                            <input type="radio" name="variant" value="3">
                            <span class="pseudo"></span>
                            Третій
                        </label>
                    </p>
                </fieldset>
                <fieldset class="fieldset">
                    <legend>Виберіть додаткові варіанти</legend>
                    <p>
                        <label class="label checkbox-group type-1">
                            <input type="checkbox" name="additional" value="some">
                            <span class="pseudo"></span>
                            Якийсь варіант відповіді
                        </label>
                    </p>
                    <p>
                        <label class="label checkbox-group type-2">
                            <input type="checkbox" name="additional" value="other">
                            <span class="pseudo"></span>
                            Інший варіант відповіді
                        </label>
                    </p>
                    <p>
                        <label class="label checkbox-group type-3">
                            <input type="checkbox" name="additional" value="more">
                            <span class="pseudo"></span>
                            Ще варіант відповіді
                        </label>
                    </p>
                </fieldset>
                <button type="submit" class="btn">Send</button>
            </form>
        </section>
    </main>
</body>

</html>
